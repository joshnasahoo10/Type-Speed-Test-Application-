{% extends 'base.html' %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<div class="container">

<h2>Typing Test ⌨️</h2>

<p id="text">{{ text.text }}</p>

<p>Time Left: <span id="timer">60</span> seconds</p>

<textarea id="input" placeholder="Start typing here..."></textarea>

<br><br>

<button onclick="startTest()">Start Test</button>

<button onclick="submitTest()">Submit</button>

<p id="result"></p>

</div>

<script>

let startTime;
let time = 60;
let timerInterval;

function startTest(){

startTime = new Date().getTime();

time = 60;

document.getElementById("timer").innerHTML = time;

timerInterval = setInterval(function(){

time--;

document.getElementById("timer").innerHTML = time;

if(time <= 0){

clearInterval(timerInterval);

submitTest();

}

},1000);

}

function submitTest(){

clearInterval(timerInterval);

let endTime = new Date().getTime();

let totalTime = (endTime - startTime) / 1000;

let typedText = document.getElementById("input").value;

let wordCount = typedText.trim().split(/\s+/).length;

let wpm = Math.round((wordCount / totalTime) * 60);

let originalText = document.getElementById("text").innerText;

let correct = 0;

for(let i=0;i<typedText.length;i++){

if(typedText[i] === originalText[i]){

correct++;

}

}

let accuracy = Math.round((correct / originalText.length) * 100);

document.getElementById("result").innerHTML = 
"Speed: " + wpm + " WPM | Accuracy: " + accuracy + "%";

}

</script>

{% endblock %}
