<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Typing Skill Analyzer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#141e30,#243b55);
}

.register-container{
background:white;
width:420px;
padding:40px;
border-radius:10px;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
text-align:center;
}

.register-container h1{
margin-bottom:25px;
color:#333;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
font-size:15px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:5px;
background:#28a745;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1e7e34;
}

.login-link{
margin-top:20px;
font-size:14px;
}

.login-link a{
color:#007bff;
text-decoration:none;
font-weight:bold;
}

.login-link a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="register-container">

<h1>Create Account</h1>

<form method="post">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">Create Account</button>

</form>

<div class="login-link">
<p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
</div>

</div>

</body>
</html>
